services:
  db:
    image: postgres:16
    container_name: graphql-chat-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: graphql-chat-server
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
    volumes:
      - ./server/src:/app/src
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npx tsx watch src/index.ts"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: graphql-chat-client
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GRAPHQL_ENDPOINT: ${NEXT_PUBLIC_GRAPHQL_ENDPOINT}
      NEXT_PUBLIC_GRAPHQL_WS_ENDPOINT: ${NEXT_PUBLIC_GRAPHQL_WS_ENDPOINT}
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    command: npx next dev

volumes:
  db_data:
